<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
  <title>Forum – Follow Cursor</title>
  <link rel="stylesheet" href="/src/style.scss">
</head>
<body class="app-page forum-page">
  <div class="layout-workspace">
    <aside class="layout-sidebar" aria-label="Nabídka a nástroje">
      <div class="layout-sidebar-col layout-sidebar-col--pages">
        <nav class="layout-page-list">
          <ul>
            <li><a href="index.html">Rozložení loga</a></li>
            <li><a href="filhramonie.html">FilHRAmonie</a></li>
            <li><a href="testing.html">Testování</a></li>
            <li><a href="forum.html">Forum</a></li>
          </ul>
        </nav>
        <div class="layout-sidebar-fill"></div>
        <div class="layout-sidebar-sep"></div>
        <p class="forum-sidebar-hint">Dvojklik bod A, pak klik bod B → rovnoměrná řada razítek. Mezerník: změna loga | R: restart | P: PNG | S: SVG | Šipky ↑↓: rychlost oscilace | Šipky ←→: střed přechodu</p>
      </div>
      <div class="layout-sidebar-col layout-sidebar-col--tools">
        <div class="forum-palette layout-palette">
          <ul class="layout-palette-list">
            <li class="layout-palette-line">
              <span class="layout-palette-label">Barva 1</span>
              <div class="layout-palette-swatch" id="forum-color1-swatch"></div>
            </li>
            <li class="layout-palette-line">
              <span class="layout-palette-label">Barva 2</span>
              <div class="layout-palette-swatch" id="forum-color2-swatch"></div>
            </li>
            <li class="layout-palette-line layout-palette-line--buttons">
              <button type="button" id="forum-btn-save-palette">Uložit paletu</button>
              <button type="button" id="forum-btn-reset-palette">Obnovit</button>
            </li>
          </ul>
        </div>
        <div class="layout-sidebar-sep"></div>
        <div class="forum-controls">
          <label class="forum-toggle-a4"><input type="checkbox" id="forum-toggle-a4" checked> Rám A4</label>
          <button type="button" id="forum-btn-logo">Změnit logo</button>
          <button type="button" id="forum-btn-restart">Restartovat</button>
          <label>Rychlost oscilace <input type="range" id="forum-slider-osc" min="1" max="100" value="20"></label>
          <label>Střed přechodu <input type="range" id="forum-slider-grad" min="10" max="90" value="50"></label>
          <label>Velikost <input type="range" id="forum-slider-size" min="50" max="200" value="100"></label>
        </div>
      </div>
    </aside>
    <main>
      <div id="forum-canvas"></div>
    </main>
  </div>
  <ul class="export-popup">
    <li><button type="button" id="forum-btn-png">Exportovat PNG</button></li>
    <li><button type="button" id="forum-btn-svg">Exportovat SVG</button></li>
  </ul>
  <script type="module" src="/src/forum.js"></script>
</body>
</html>
