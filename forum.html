<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forum – Follow Cursor</title>
  <link rel="stylesheet" href="/src/style.scss">
</head>
<body class="forum-page">
  <header>
    <p><a href="index.html">Logo Layout</a> · <a href="testing.html">Testing</a> · <a href="forum.html">Forum</a></p>
  </header>
  <main>
    <div id="forum-canvas"></div>
  </main>
  <footter>
    <p>Double-click point A, then click point B → even row of stamps. Space: change logo | R: restart | P: PNG | S: SVG | Arrows ↑↓: oscillation speed | Arrows ←→: gradient center</p>
    <div class="forum-controls">
      <label class="forum-toggle-a4"><input type="checkbox" id="forum-toggle-a4" checked> A4 frame</label>
      <button type="button" id="forum-btn-logo">Change logo</button>
      <button type="button" id="forum-btn-restart">Restart</button>
      <button type="button" id="forum-btn-png">PNG</button>
      <button type="button" id="forum-btn-svg">SVG</button>
      <label>Oscillation speed <input type="range" id="forum-slider-osc" min="1" max="100" value="20"></label>
      <label>Gradient center <input type="range" id="forum-slider-grad" min="10" max="90" value="50"></label>
      <label>Size <input type="range" id="forum-slider-size" min="50" max="200" value="100"></label>
    </div>
  </footter>
  <script type="module" src="/src/forum.js"></script>
</body>
</html>
