<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bertin Logo Layout</title>
  <link rel="preload" href="/fonts/205TF-Bertin-DotSizeVAR.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="/src/style.scss">
</head>
<body class="layout-page">
  <header class="layout-header">
    <p><a href="index.html">Logo Layout</a> · <a href="testing.html">Testing</a> · <a href="filharmonie.html">Filharmonie</a></p>
    <div class="layout-poster-inputs">
      <label><input type="text" id="poster-letter" value="S" maxlength="1" /> Letter</label>
      <label><input type="text" id="poster-number" value="1" maxlength="1" /> Number</label>
    </div>
  </header> 

  <main class="layout-main-two">
    <div id="layout-canvas"></div>
    <div id="poster-canvas"></div>
  </main>

  <footer class="layout-footer">
    <p class="layout-footer-buttons">
      <button type="button" id="layout-btn-unify">Unify</button><span class="btn-sep">·</span>
      <button type="button" id="layout-btn-symmetrical">Symmetrical</button><span class="btn-sep">·</span>
      <button type="button" id="layout-btn-layer1">Layer 1</button><span class="btn-sep">·</span>
      <button type="button" id="layout-btn-layer2">Layer 2</button><span class="btn-sep">·</span>
      <!-- <button type="button" id="layout-btn-cutout">Cutout</button><span class="btn-sep">·</span> -->
      <button type="button" id="layout-btn-randomize">Randomize styling</button><span class="btn-sep">·</span>
      <button type="button" id="layout-btn-extreme">Randomize extreme</button><span class="btn-sep">·</span>
      <button type="button" id="layout-btn-typeface">Change typeface</button><span class="btn-sep">·</span>
      <button type="button" id="layout-btn-colors">Randomize colors</button>
    </p>
    <div class="layout-css-row">
      <div class="layout-css-col">
        <p id="layout-font-info-1"></p>
        <pre id="layout-css-layer1"></pre>
      </div>
      <div class="layout-css-col">
        <p id="layout-font-info-2"></p>
        <pre id="layout-css-layer2"></pre>
      </div>
    </div>
  </footer>

  <script type="module" src="/src/layout.js"></script>
</body>
</html>
