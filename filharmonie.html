<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Filharmonie – Follow Cursor</title>
  <link rel="stylesheet" href="/src/style.scss">
</head>
<body class="filharmonie-page">
  <header>
    <p><a href="/">Logo Layout</a> · <a href="/testing.html">Testing</a> · <a href="/filharmonie.html">Filharmonie</a></p>
  </header>
  <main>
    <div id="filharmonie-canvas"></div>
  </main>
  <footter>
    <p>Double-click point A, then click point B → even row of stamps. Space: change logo | R: restart | P: PNG | S: SVG | Arrows ↑↓: oscillation speed | Arrows ←→: gradient center</p>
    <div class="filharmonie-controls">
      <button type="button" id="filharmonie-btn-logo">Change logo</button>
      <button type="button" id="filharmonie-btn-restart">Restart</button>
      <button type="button" id="filharmonie-btn-png">PNG</button>
      <button type="button" id="filharmonie-btn-svg">SVG</button>
      <label>Oscillation speed <input type="range" id="filharmonie-slider-osc" min="1" max="100" value="20"></label>
      <label>Gradient center <input type="range" id="filharmonie-slider-grad" min="10" max="90" value="50"></label>
      <label>Size <input type="range" id="filharmonie-slider-size" min="50" max="200" value="100"></label>
    </div>
  </footter>
  <script type="module" src="/src/filharmonie.js"></script>
</body>
</html>
